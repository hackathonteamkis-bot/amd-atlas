# ─────────────────────────────────────────────────────────────────────────────
# Cloud Build — Build & Deploy to Cloud Run
# ─────────────────────────────────────────────────────────────────────────────
# Trigger: Push to main branch, or manual trigger via `gcloud builds submit`
#
# Required substitutions (set in trigger or --substitutions flag):
#   _REGION          — GCP region (default: asia-south1)
#   _SERVICE_NAME    — Cloud Run service name (default: nourish-app)
#   _REPOSITORY      — Artifact Registry repo (default: nourish-repo)
#
# Required secrets (set via Cloud Run env vars or Secret Manager):
#   DATABASE_URL, DIRECT_URL, AUTH_SECRET, SMTP_HOST, SMTP_PORT,
#   SMTP_USER, SMTP_PASS, SMTP_FROM
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: "asia-south1"
  _SERVICE_NAME: "nourish-app"
  _REPOSITORY: "nourish-repo"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

steps:
  # ── Step 1: Build the Docker image ──
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest"
      - "--cache-from"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest"
      - "."
    timeout: "600s"

  # ── Step 2: Push images to Artifact Registry ──
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}"

  # ── Step 3: Deploy to Cloud Run ──
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--port"
      - "8080"
      - "--allow-unauthenticated"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "10"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--timeout"
      - "300s"
      - "--concurrency"
      - "80"
      - "--set-env-vars"
      - "NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest"

timeout: "1200s"
