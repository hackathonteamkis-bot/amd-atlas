# ─────────────────────────────────────────────────────────────────────────────
# Google App Engine Standard — Nourish App
# ─────────────────────────────────────────────────────────────────────────────
# Deploy: gcloud app deploy
# ─────────────────────────────────────────────────────────────────────────────

runtime: nodejs20
env: standard
instance_class: F2

# Auto-scaling
automatic_scaling:
  min_instances: 0
  max_instances: 5
  target_cpu_utilization: 0.65
  max_concurrent_requests: 80

# Environment variables (non-secret)
env_variables:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"

# Route all traffic through the app
handlers:
  - url: /.*
    script: auto
    secure: always
